project:
  name: "spec-driven-pipeline"
  version: "1.0.0"

paths:
  specs_raw:    "specs/raw"
  output_dir:   "output/generated"
  audit_logs:   "audit/logs"
  audit_traces: "audit/traces"

generation:
  provider:    "gemini"
  model:       "gemini-2.5-flash"
  temperature: 0.2
  max_tokens:  4096

audit:
  enabled:           true
  trace_every_stage: true
